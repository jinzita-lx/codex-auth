<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="330" viewBox="0 0 1100 330" role="img" aria-label="codex-auth list screenshot with masked accounts">
  <style>
    .bg { fill: #101418; }
    .bar { fill: #1c232b; }
    .text { font: 16px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill: #d6deeb; }
    .muted { fill: #7f8a99; }
    .green { fill: #55c878; }
    .yellow { fill: #e7b84f; }
    .cyan { fill: #56b6c2; }
    .blue { fill: #61afef; }
    .red { fill: #e06c75; }
    .title { font: 14px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill: #aeb7c2; }
  </style>
  <rect x="0" y="0" width="1100" height="330" rx="12" class="bg"/>
  <rect x="0" y="0" width="1100" height="42" rx="12" class="bar"/>
  <circle cx="22" cy="21" r="6" fill="#ff5f57"/>
  <circle cx="44" cy="21" r="6" fill="#ffbd2e"/>
  <circle cx="66" cy="21" r="6" fill="#28c840"/>
  <text x="92" y="27" class="title">codex-auth list</text>

  <text x="28" y="78" class="text">$ codex-auth list</text>
  <text x="28" y="122" class="text muted">profile</text>
  <text x="250" y="122" class="text muted">status</text>
  <text x="380" y="122" class="text muted">plan</text>
  <text x="480" y="122" class="text muted">5h</text>
  <text x="560" y="122" class="text muted">7d</text>
  <text x="650" y="122" class="text muted">account</text>

  <text x="28" y="160" class="text cyan">* pro</text>
  <text x="250" y="160" class="text green">ok</text>
  <text x="380" y="160" class="text cyan">prolite</text>
  <text x="480" y="160" class="text green">100%</text>
  <text x="560" y="160" class="text green">97%</text>
  <text x="650" y="160" class="text">ji***@gmail.com</text>

  <text x="28" y="198" class="text">  plus</text>
  <text x="250" y="198" class="text green">ok</text>
  <text x="380" y="198" class="text cyan">plus</text>
  <text x="480" y="198" class="text yellow">28%</text>
  <text x="560" y="198" class="text green">89%</text>
  <text x="650" y="198" class="text">xi***@gmail.com</text>

  <text x="28" y="252" class="text muted">list 是快速索引视图：用来确认当前账号、可用状态和剩余额度。</text>
</svg>
