<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="470" viewBox="0 0 1100 470" role="img" aria-label="codex-auth login-api screenshot with masked API key">
  <style>
    .bg { fill: #101418; }
    .bar { fill: #1c232b; }
