  <text x="28" y="340" class="text green">Saved API auth profile: peach-api</text>
  <text x="28" y="376" class="text green">Saved API config profile: peach-api</text>
  <text x="28" y="412" class="text yellow">Restarted Codex app-server so future sessions reload auth.</text>
  <text x="28" y="446" class="text muted">Logged in using an API key - sk-****...****</text>
