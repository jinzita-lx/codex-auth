<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="420" viewBox="0 0 1100 420" role="img" aria-label="codex-auth login screenshot with masked account">
  <style>
    .bg { fill: #101418; }
    .bar { fill: #1c232b; }
    .text { font: 16px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill: #d6deeb; }
    .muted { fill: #7f8a99; }
    .green { fill: #55c878; }
    .yellow { fill: #e7b84f; }
    .cyan { fill: #56b6c2; }
    .title { font: 14px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill: #aeb7c2; }
  </style>
  <rect x="0" y="0" width="1100" height="420" rx="12" class="bg"/>
  <rect x="0" y="0" width="1100" height="42" rx="12" class="bar"/>
  <circle cx="22" cy="21" r="6" fill="#ff5f57"/>
  <circle cx="44" cy="21" r="6" fill="#ffbd2e"/>
  <circle cx="66" cy="21" r="6" fill="#28c840"/>
  <text x="92" y="27" class="title">codex-auth login</text>

  <text x="28" y="78" class="text">$ codex-auth login work --device-auth</text>
  <text x="28" y="118" class="text">Starting Codex login for profile: <tspan class="cyan">work</tspan></text>
  <text x="28" y="154" class="text muted">The current auth.json was moved aside locally; codex logout is not used.</text>
  <text x="28" y="202" class="text">Open this URL and complete login:</text>
  <text x="28" y="238" class="text cyan">https://chatgpt.com/activate?user_code=****-****</text>
  <text x="28" y="286" class="text green">Saved new Codex auth as profile: work</text>
  <text x="28" y="326" class="text">$ codex-auth list --no-check</text>
  <text x="28" y="362" class="text muted">profile            status    plan    5h    7d    account</text>
  <text x="28" y="394" class="text cyan">* work</text>
  <text x="250" y="394" class="text muted">unchecked -       -     -     wo***@company.com</text>
</svg>
